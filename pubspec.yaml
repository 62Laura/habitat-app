name: habit_app
description: Refactored Habit Tracker with improved state management and UI/UX.

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # UI & Styling
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  
  # Form & Input
  pin_code_fields: ^8.0.1
  flutter_otp_text_field: ^1.1.1
  
  # Local Storage
  shared_preferences: ^2.1.1
  
  # Utilities
  timezone: ^0.9.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true
  # assets:
  #   - assets/images/
